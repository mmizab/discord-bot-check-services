name: Service Status Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run status check
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        shell: python
        run: |
          import requests
          import os
          import sys

          services = {
              "Discord": "https://discordstatus.com/api/v2/summary.json",
              "Jira": "https://status.atlassian.com/api/v2/summary.json",
              "Figma": "https://status.figma.com/api/v2/summary.json",
              "Webflow": "https://status.webflow.com/api/v2/summary.json"
          }

          webhook_url = os.getenv('DISCORD_WEBHOOK')
          if not webhook_url:
              print("Error: DISCORD_WEBHOOK secret is not set")
              sys.exit(1)

          issues = []

          for name, url in services.items():
              try:
                  r = requests.get(url, timeout=10)
                  r.raise_for_status()
                  data = r.json()
                  desc = data.get('status', {}).get('description', 'Unknown status')
                  
                  if desc != "All Systems Operational":
                      issues.append(f"**{name}**: {desc}")
              except Exception as e:
                  issues.append(f"**{name}**: Connection Error ({str(e)})")

          if issues:
              message = "SERVICE STATUS ALERT\n" + "\n".join(issues)
          else:
              message = "All systems are operational."

          payload = {"content": message}
          requests.post(webhook_url, json=payload)
