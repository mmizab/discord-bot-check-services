          import requests
          import os

          # Configuration
          services = {
              "Discord": "https://discordstatus.com/api/v2/summary.json",
              "Jira": "https://status.atlassian.com/api/v2/summary.json",
              "Figma": "https://status.figma.com/api/v2/summary.json",
              "Webflow": "https://status.webflow.com/api/v2/summary.json"
          }

          history_links = {
              "Discord": "https://discordstatus.com/#past-incidents",
              "Jira": "https://jira-software.status.atlassian.com/#past-incidents",
              "Figma": "https://status.figma.com/",
              "Webflow": "https://status.webflow.com/history",
              "Bitbucket": "https://bitbucket.status.atlassian.com/#past-incidents"
          }

          webhook_url = os.getenv('DISCORD_WEBHOOK')
          is_weekly = os.getenv('IS_WEEKLY') == 'true'
          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'}
          issues = []

          # 1. Standard JSON Services
          for name, url in services.items():
              try:
                  r = requests.get(url, headers=headers, timeout=15)
                  if r.status_code == 200:
                      data = r.json()
                      desc = data.get('status', {}).get('description', 'Unknown')
                      if desc != "All Systems Operational":
                          link = history_links.get(name, "")
                          issues.append(f"**{name}**: {desc}\n   [View History]({link})")
              except Exception:
                  issues.append(f"**{name}**: Connection Error")

          # 2. Google Workspace
          try:
              google_url = "https://www.google.com/appsstatus/dashboard/incidents.json"
              g_r = requests.get(google_url, headers=headers, timeout=15)
              if g_r.status_code == 200:
                  incidents = g_r.json()
                  active_google_issues = [
                      f"{i.get('service_name')}: {i.get('status_impact')}" 
                      for i in incidents 
                      if i.get('most_recent_update', {}).get('status') != 'AVAILABLE'
                  ]
                  if active_google_issues:
                      issues.append(f"**Google**: {', '.join(active_google_issues)}\n   [View History](https://www.google.com/appsstatus)")
          except Exception:
              issues.append("**Google**: Connection Error")

          # 3. Microsoft Cloud
          try:
              ms_url = "https://admin.microsoft.com/api/servicestatus/index"
              ms_r = requests.get(ms_url, headers=headers, timeout=15)
              if ms_r.status_code == 200:
                  data = ms_r.json()
                  if not data.get('IsAllUp', True):
                      ms_issues = [s.get('Name') for s in data.get('Services', []) if s.get('IsUp') is False]
                      msg = f"**Microsoft**: Issues in {', '.join(ms_issues)}" if ms_issues else "**Microsoft**: General service interruption"
                      issues.append(f"{msg}\n   [View History](https://admin.microsoft.com/servicestatus)")
          except Exception:
              issues.append("**Microsoft**: Connection/Parsing Error")

          # 4. Handle Notifications
          if issues:
              message = "⚠️ **SERVICE STATUS ALERT** ⚠️\n\n" + "\n\n".join(issues)
              requests.post(webhook_url, json={"content": message})
          elif is_weekly:
              message = "✅ **Weekly Status Report**: All systems are operational.\n"
              message += "Quick Links: " + ", ".join([f"[{k}]({v})" for k, v in history_links.items()])
              requests.post(webhook_url, json={"content": message})