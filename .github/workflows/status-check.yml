name: Service Status Monitor

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 minutes
    - cron: '0 9 * * 1'    # Every Monday at 9:00 AM UTC
  workflow_dispatch:

jobs:
  check-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run status check
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          IS_WEEKLY: ${{ github.event.schedule == '0 9 * * 1' || github.event_name == 'workflow_dispatch' }}
        shell: python
        run: |
          import requests
          import os
          import xml.etree.ElementTree as ET

          services = {
              "Discord": "https://discordstatus.com/api/v2/summary.json",
              "Jira": "https://status.atlassian.com/api/v2/summary.json",
              "Figma": "https://status.figma.com/api/v2/summary.json",
              "Webflow": "https://status.webflow.com/api/v2/summary.json"
          }

          webhook_url = os.getenv('DISCORD_WEBHOOK')
          is_weekly = os.getenv('IS_WEEKLY') == 'true'
          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'}
          issues = []

          # 1. Standard JSON Services
          for name, url in services.items():
              try:
                  r = requests.get(url, headers=headers, timeout=15)
                  if r.status_code == 200:
                      data = r.json()
                      desc = data.get('status', {}).get('description', 'Unknown')
                      if desc != "All Systems Operational":
                          issues.append(f"**{name}**: {desc}")
              except Exception:
                  issues.append(f"**{name}**: Connection Error")

          # 2. Google Workspace
          try:
              google_url = "https://www.google.com/appsstatus/dashboard/incidents.json"
              g_r = requests.get(google_url, headers=headers, timeout=15)
              if g_r.status_code == 200:
                  incidents = g_r.json()
                  active_google_issues = [
                      f"{i.get('service_name')}: {i.get('status_impact')}" 
                      for i in incidents 
                      if i.get('most_recent_update', {}).get('status') != 'AVAILABLE'
                  ]
                  if active_google_issues:
                      issues.append(f"**Google**: {', '.join(active_google_issues)}")
          except Exception:
              issues.append("**Google**: Connection Error")

          # 3. Microsoft Cloud (Using the provided XML structure)
          try:
              ms_xml_url = "https://admin.microsoft.com/api/servicestatus/index"
              ms_r = requests.get(ms_xml_url, headers=headers, timeout=15)
              if ms_r.status_code == 200:
                  root = ET.fromstring(ms_r.content)
                  
                  # Shortcut check: IsAllUp
                  is_all_up = root.find('IsAllUp')
                  if is_all_up is not None and is_all_up.text.lower() != 'true':
                      # Find which specific services are down
                      ms_issues = []
                      for service in root.findall('.//Service'):
                          name = service.find('Name').text
                          is_up = service.find('IsUp').text
                          if is_up.lower() == 'false':
                              ms_issues.append(name)
                      
                      if ms_issues:
                          issues.append(f"**Microsoft**: Issues in {', '.join(ms_issues)}")
                      else:
                          # Fallback if IsAllUp is false but no specific service is marked false
                          issues.append("**Microsoft**: General service interruption reported")
          except Exception as e:
              issues.append(f"**Microsoft**: Connection/Parsing Error")

          # 4. Handle Notifications
          if issues:
              message = "⚠️ **SERVICE STATUS ALERT** ⚠️\n" + "\n".join(issues)
              requests.post(webhook_url, json={"content": message})
          elif is_weekly:
              message = "✅ **Weekly Status Report**: All systems (Discord, Jira, Figma, Webflow, Google, and Microsoft) are operational."
              requests.post(webhook_url, json={"content": message})